{% extends 'base.html' %}

{% block title %}Apply to {{ company.name }} | PUP Internship System{% endblock %}

{% block content %}
<div class="max-w-2xl mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 mt-8">
    <div class="mb-6 border-b pb-4">
        <h1 class="text-2xl font-extrabold text-gray-900">Internship Application</h1>
        <p class="text-gray-500 mt-1">Applying to <span class="font-bold text-red-700">{{ company.name }}</span></p>
    </div>

    <form method="POST" enctype="multipart/form-data" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label for="{{ form.student_resume.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                Upload Resume (PDF/Word)
            </label>
            {{ form.student_resume }}
        </div>

        <div>
            <label for="{{ form.cover_letter.id_for_label }}" class="block text-sm font-medium text-gray-700 mb-1">
                Cover Letter
            </label>
            {{ form.cover_letter }}
        </div>

        <div class="pt-4 flex items-center justify-between">
            <a href="{% url 'companies:company_detail' company.id %}" class="text-sm font-medium text-gray-600 hover:text-gray-900">
                Cancel
            </a>
            <button type="submit" class="bg-red-800 text-white font-bold py-2 px-6 rounded hover:bg-red-700 transition-colors shadow-sm">
                Submit Application
            </button>
        </div>
    </form>
</div>
{% endblock %}
