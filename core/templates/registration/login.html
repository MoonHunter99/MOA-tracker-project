{% extends "base.html" %}

{% block title %}Log In | PUP Internship System{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white p-8 rounded-xl shadow-sm border border-gray-200 mt-12">
    <h2 class="text-2xl font-extrabold text-gray-900 mb-6 text-center">Student Login</h2>
    
    <form method="post" class="space-y-4">
        {% csrf_token %}
        {{ form.as_p }}
        
        <button type="submit" class="w-full bg-red-800 text-white font-bold py-2 px-4 rounded hover:bg-red-700 transition-colors">
            Log In
        </button>
    </form>
    
    <p class="mt-4 text-center text-sm text-gray-600">
        Don't have an account? <a href="{% url 'accounts:register' %}" class="text-red-700 hover:underline">Register here</a>
    </p>
</div>
{% endblock %}
