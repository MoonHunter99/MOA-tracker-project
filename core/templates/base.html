<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}PUP Internship System{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
</head>
<body class="bg-gray-50 text-gray-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-red-800 text-white shadow-md">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0">
                    <a href="/" class="font-bold text-xl tracking-tight">PUP MOA & Internship Tracker</a>
                </div>
                <div class="hidden md:flex space-x-4 items-center">
                    <a href="/" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium">Dashboard</a>
                    
                    {% if user.is_authenticated %}
                        <a href="{% url 'applications:my_applications' %}" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium">My Applications</a>
                        
                        <a href="{% url 'moas:my_moa_requests' %}" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium">My MOA Requests</a>
                        
                        <span class="text-sm font-medium ml-4 text-red-200">Hello, {{ user.username }}</span>
                        <form action="{% url 'accounts:logout' %}" method="post" class="inline">
                            {% csrf_token %}
                            <button type="submit" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium">Logout</button>
                        </form>
                    {% else %}
                        <a href="{% url 'accounts:login' %}" class="hover:bg-red-700 px-3 py-2 rounded-md text-sm font-medium">Log In</a>
                        <a href="{% url 'accounts:register' %}" class="bg-white text-red-800 hover:bg-gray-100 px-3 py-2 rounded-md text-sm font-bold">Register</a>
                    {% endif %}
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        {% block content %}
        {% endblock content %}
    </main>

    <footer class="bg-gray-800 text-white text-center py-4 mt-auto">
        <p class="text-sm">&copy; 2026 Polytechnic University of the Philippines. All rights reserved.</p>
    </footer>

</body>
</html>
