{% extends "university_admin/admin_base.html" %}

{% block admin_content %}
<div class="mb-6 border-b border-gray-200 pb-4 flex items-center gap-4">
    <a href="{% url 'university_admin:manage_roles' %}" class="text-gray-400 hover:text-gray-600">
        &larr; Back to Roles
    </a>
    <h1 class="text-2xl font-bold text-gray-900">Edit User Role</h1>
</div>

<div class="max-w-2xl bg-white shadow rounded-lg p-8 border border-gray-200">
    <div class="mb-8">
        <h2 class="text-lg font-bold text-gray-800">{{ target_user.get_full_name|default:target_user.username }}</h2>
        <p class="text-sm text-gray-500">{{ target_user.email }}</p>
    </div>

    <form method="post" class="space-y-6">
        {% csrf_token %}
        
        <div>
            <label class="block text-sm font-bold text-gray-700 mb-3">Select Administrative Role</label>
            <div class="space-y-3">
                <div class="flex items-center">
                    <input id="no_role" name="group_id" type="radio" value="" {% if not target_user.groups.all %}checked{% endif %} class="focus:ring-red-500 h-4 w-4 text-red-600 border-gray-300">
                    <label for="no_role" class="ml-3 block text-sm font-medium text-gray-700">
                        No Specific Role (Basic Admin Access)
                    </label>
                </div>
                {% for group in groups %}
                <div class="flex items-center">
                    <input id="group_{{ group.id }}" name="group_id" type="radio" value="{{ group.id }}" {% if group in target_user.groups.all %}checked{% endif %} class="focus:ring-red-500 h-4 w-4 text-red-600 border-gray-300">
                    <label for="group_{{ group.id }}" class="ml-3 block text-sm font-medium text-gray-700">
                        {{ group.name }}
                    </label>
                </div>
                {% endfor %}
            </div>
        </div>

        <div class="pt-6 border-t border-gray-100 flex justify-end">
            <button type="submit" class="inline-flex items-center px-6 py-3 border border-transparent text-sm font-bold rounded-md shadow-sm text-white bg-red-700 hover:bg-red-800 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-red-500 transition-colors">
                Update User Role
            </button>
        </div>
    </form>
</div>
{% endblock %}
